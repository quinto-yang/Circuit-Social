name: Release Gate

on:
  workflow_dispatch:
    inputs:
      withWallet:
        description: "Run wallet e2e in gate"
        type: boolean
        default: false
  push:
    tags:
      - "v*"

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run release gate
        run: |
          if [ "${{ inputs.withWallet }}" = "true" ]; then
            npm run release:gate -- --with-wallet
          else
            npm run release:gate
          fi
