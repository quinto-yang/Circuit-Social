services:
  postgres:
    image: postgres:16-alpine
    container_name: cx-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-circuit_social}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-circuit_social}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cx-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  db-init:
    image: wx-api
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: cx-db-init
    working_dir: /app
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/circuit_social}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy --schema apps/api/prisma/schema.prisma"
    restart: "no"

  api:
    image: wx-api
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: cx-api
    environment:
      PORT: 4000
      LISTEN_HOST: 0.0.0.0
      NODE_ENV: production
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/circuit_social}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    ports:
      - "${API_HOST_PORT:-4000}:4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4000/api/health',(r)=>{r.resume();r.on('end',()=>process.exit(r.statusCode===200?0:1));}).on('error',()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped

  web:
    image: wx-web
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        NEXT_PUBLIC_API_ORIGIN: ${NEXT_PUBLIC_API_ORIGIN:-http://localhost:4000}
    container_name: cx-web
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_ORIGIN: ${NEXT_PUBLIC_API_ORIGIN:-http://localhost:4000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
