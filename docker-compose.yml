services:
  postgres:
    image: postgres:16-alpine
    container_name: cx-postgres
    environment:
      POSTGRES_DB: circuit_social
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d circuit_social"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: cx-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-init:
    image: node:20-alpine
    container_name: cx-db-init
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/circuit_social
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npm ci &&
             npx prisma db push --schema apps/api/prisma/schema.prisma"
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: cx-api
    environment:
      PORT: 4000
      NODE_ENV: production
      WEB_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/circuit_social
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_ORIGIN: http://localhost:4000
    container_name: cx-web
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_ORIGIN: http://localhost:4000
    depends_on:
      api:
        condition: service_started
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
